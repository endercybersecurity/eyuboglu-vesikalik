<!DOCTYPE html>
<html lang="tr" data-tema="acik">
<head>
<meta charset="UTF-8">
<title>Eyuboğlu Kolej - Galeri</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --bg2: #ffffff;
    --text: #1a1a1a;
    --text2: #555;
    --accent: #2E75B6;
    --accent2: #1a5a9a;
    --border: #d8d8d0;
    --card-bg: #ffffff;
    --card-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.04);
    --bar-bg: #e0ddd6;
    --no-color: #2E75B6;
    --header-border: #d0cec6;
    --lb-bg: rgba(245,244,240,0.96);
  }

  [data-tema="koyu"] {
    --bg: #1a1a2e;
    --bg2: #16213e;
    --text: #eeeeee;
    --text2: #aaaaaa;
    --accent: #2E75B6;
    --accent2: #5aa3e0;
    --border: #2a3a5a;
    --card-bg: #16213e;
    --card-shadow: 0 1px 4px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    --bar-bg: #2a3a5a;
    --no-color: #90c8f0;
    --header-border: #2a3a5a;
    --lb-bg: rgba(10,10,24,0.95);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 0;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--header-border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.3s, border-color 0.3s;
  }

  .baslik-grup {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  #durum {
    color: var(--text2);
    font-size: 12px;
    letter-spacing: 0.2px;
  }

  /* Tema Switcher */
  .tema-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 7px 14px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tema-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tema-icon {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  /* Progress */
  .progress-wrap {
    padding: 10px 32px 0 32px;
    background: var(--bg2);
    border-bottom: 1px solid var(--header-border);
    transition: background 0.3s;
  }

  #progress-bar-wrap {
    width: 100%;
    background: var(--bar-bg);
    height: 3px;
    border-radius: 0;
    transition: background 0.3s;
  }

  #progress-bar {
    height: 3px;
    background: var(--accent);
    width: 0%;
    transition: width 0.15s linear;
  }

  /* Gallery */
  .galeri-wrap {
    padding: 24px 32px;
  }

  .galeri {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  .kart {
    background: var(--card-bg);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.2s, background 0.3s;
  }

  .kart:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(46,117,182,0.15);
    border-color: var(--accent);
  }

  .kart img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
  }

  .kart .no {
    padding: 7px 10px;
    font-size: 11px;
    font-weight: 600;
    color: var(--no-color);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Lightbox */
  #lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--lb-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 14px;
  }

  #lightbox.aktif { display: flex; }

  #lightbox img {
    max-width: 90%;
    max-height: 80vh;
    border-radius: 6px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  #lightbox .lb-no {
    color: var(--text2);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  #lightbox .kapat {
    position: absolute;
    top: 20px;
    right: 28px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg2);
    cursor: pointer;
    color: var(--text);
    font-size: 18px;
    transition: all 0.2s;
    line-height: 1;
  }

  #lightbox .kapat:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>

<header>
  <div class="baslik-grup">
    <h1>Eyuboğlu Kolej — Öğrenci Fotoğrafları</h1>
    <div id="durum">Yükleniyor... (0 / 2000)</div>
  </div>
  <button class="tema-btn" onclick="temaDegistir()" id="temaBtnEl">
    <svg class="tema-icon" id="temaIkon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <span id="temaBtnYazi">Koyu Tema</span>
  </button>
</header>

<div class="progress-wrap">
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
</div>

<div class="galeri-wrap">
  <div class="galeri" id="galeri"></div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <span class="kapat" onclick="kapat()">&#x2715;</span>
  <img id="lb-img" src="" alt="">
  <div class="lb-no" id="lb-no"></div>
</div>

<script>
  const BASE = "https://my.eyuboglu.com/MYEYB/OGRENCI/KOLEJ/";
  const TOPLAM = 2000;
  const galeri = document.getElementById("galeri");
  const durum = document.getElementById("durum");
  const bar = document.getElementById("progress-bar");

  let tamamlanan = 0;
  let calisan = 0;

  // Tema
  const GUNE_IKON = `<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 5a7 7 0 1 0 0 14A7 7 0 0 0 12 5z"/>`;
  const AY_IKON = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;

  function temaDegistir() {
    const html = document.documentElement;
    const koyu = html.getAttribute("data-tema") === "koyu";
    html.setAttribute("data-tema", koyu ? "acik" : "koyu");
    document.getElementById("temaIkon").innerHTML = koyu ? AY_IKON : GUNE_IKON;
    document.getElementById("temaBtnYazi").textContent = koyu ? "Koyu Tema" : "Açık Tema";
  }

  function guncelle() {
    tamamlanan++;
    bar.style.width = (tamamlanan / TOPLAM * 100) + "%";
    if (tamamlanan === TOPLAM) {
      durum.textContent = `Tamamlandı — ${calisan} fotoğraf bulundu, ${TOPLAM - calisan} eksik gizlendi`;
    } else {
      durum.textContent = `Kontrol ediliyor... ${tamamlanan} / ${TOPLAM} — ${calisan} fotoğraf bulundu`;
    }
  }

  function ac(src, no) {
    document.getElementById("lb-img").src = src;
    document.getElementById("lb-no").textContent = "No: " + no;
    document.getElementById("lightbox").classList.add("aktif");
  }

  function kapat() {
    document.getElementById("lightbox").classList.remove("aktif");
  }

  document.getElementById("lightbox").addEventListener("click", function(e) {
    if (e.target === this) kapat();
  });

  const BATCH = 50;

  async function yukle(i) {
    return new Promise(resolve => {
      const src = BASE + i + ".bmp";
      const img = new Image();
      img.onload = () => {
        calisan++;
        const kart = document.createElement("div");
        kart.className = "kart";
        kart.innerHTML = `<img src="${src}" alt="${i}"><div class="no">No ${i}</div>`;
        kart.onclick = () => ac(src, i);
        galeri.appendChild(kart);
        guncelle();
        resolve();
      };
      img.onerror = () => {
        guncelle();
        resolve();
      };
      img.src = src;
    });
  }

  async function baslat() {
    for (let start = 1; start <= TOPLAM; start += BATCH) {
      const batch = [];
      for (let i = start; i < Math.min(start + BATCH, TOPLAM + 1); i++) {
        batch.push(yukle(i));
      }
      await Promise.all(batch);
    }
  }

  baslat();
</script>
</body>
</html>
